version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "${PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

  app1:
    build: ./app
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: always

  app2:
    build: ./app
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine