version: "3.9"

services:
    nginx:
        image: nginx:latest

        ports:
            - "${PORT}:80"

        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf

        depends_on:
            app1:
                condition: service_healthy
            app2:
                condition: service_healthy

    app1:
        build: ./app

        environment:
            - REDIS_ADDR=redis:6379

        depends_on:
            - redis

        restart: always

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]

            interval: 5s

            timeout: 2s

            retries: 3

    app2:
        build: ./app

        environment:
            - REDIS_ADDR=redis:6379

        depends_on:
            - redis

        restart: always

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]

            interval: 5s

            timeout: 2s

            retries: 3
            
            start_period: 10s

    redis:
        image: redis:7-alpine
